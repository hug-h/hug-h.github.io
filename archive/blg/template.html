<head>
    <title>!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body,
        img {
            width: 400px;
            margin: 0;
        }

        body {
            font-family: serif;
            margin-left: 1vw;
        }

        .date {
            text-align: end;
        }

        img {
            height: auto;
        }

        img,
        p {
            margin-top: 1vh;
        }

        article {
            max-height: 97vh;
            column-width: 400px;
            column-gap: 5vw;
            margin-top: 2em;
            margin-bottom: 2em;
            scroll-margin-top: 2em;

            /*scroll-snap-align: start;*/
            hr {
                margin-top: -2em;
                /*ensures the first column sits higher than the following ones*/
            }
        }

        #index {
            position: fixed;
            top: 0;
            right: 0;
            width: 15vw;
            max-height: 80vh;
            overflow-y: scroll;
            scrollbar-width: none;
            z-index: -10;
            border-width: 1px;
            border-spacing: 0.5em;
            color: black;

            td,
            tr {
                vertical-align: top;
                text-align: end;

                a {
                    color: inherit;
                    text-decoration: none;
                }
            }

        }
    </style>
    <script> //add id's and linked index
        function scripts() {
            articles = [...document.getElementsByTagName("article")];
            addIds(articles);
            index(articles);
        }

        function index(articles) {
            index = document.getElementById("index");
            articles.forEach((article) => {
                h3 = article.getElementsByTagName("h3")[0];
                link = document.createElement("a");
                link.innerHTML = h3.innerHTML;
                link.href = "#" + article.id;
                tr = document.createElement("tr");
                t = document.createElement("td");
                t.appendChild(link)
                tr.appendChild(t);
                index.appendChild(tr);
            })
        }

        function addIds(articles) {
            let ids = [];
            articles.forEach((article) => {
                title = article.getElementsByTagName("h3")[0].innerHTML;
                while (checkIdIndividual(title, ids)) { // if the given article title already exists then append an underscore to the name
                    title += "_";
                }
                ids.push(title);
                console.log(ids);
                article.id = "a_" + title;
            })
        }

        function checkIdIndividual(id, idList) { //checks see if an id exists in the array idList 
            let match = 0;
            idList.forEach((i) => {
                console.log("listID= " + i);
                console.log("check= " + id);
                if (i == id) {
                    match = 1;
                }
            })
            return match;
        }
        //js hug-h.github.io
    </script>
</head>

<body onload="scripts()">
    <table id="index">
        <td><a href="/index.html" style="color: yellow;background-color: black;">BACK2HOMEPAGE</a></td>
    </table>
